<!DOCTYPE html>
<html lang="en">
<head>

    <title>Product Catlog</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <h1>Product Catlog</h1>
    

    <table id="productTable">
        <thead>
            <tr>
                <th>Product Image</th>
                <th>Product Name</th>

    <div>
