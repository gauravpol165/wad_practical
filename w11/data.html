<!DOCTYPE html>
<html>
<head>
  <title>User Data</title>
</head>
<body>

<h2>Registered Users</h2>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>City</th>
    </tr>
  </thead>
  <tbody id="tableData"></tbody>
</table>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

let table = document.getElementById("tableData");

users.forEach(user => {
  let row = `
    <tr>
      <td>${user.name}</td>
      <td>${user.email}</td>
      <td>${user.mobile}</td>
      <td>${user.city}</td>
    </tr>
  `;
  table.innerHTML += row;
});
</script>

</body>
</html>
