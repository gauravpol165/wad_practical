<!DOCTYPE html>
<html>
<head>
  <title>Event Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">




  
  <div class="container mt-5">
    <div class="card p-4">
      <h2 class="text-center mb-4">Event Registration Form</h2>

      <!-- Success Alert (hidden by default) -->
      <div id="successMsg" class="alert alert-success d-none text-center">
        ✅ Registration Successful!
      </div>

      <form id="myForm" novalidate>

        <!-- Full Name -->
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id='name' placeholder="Full Name" required>
          <label for="name">Full Name</label>
          <div class="invalid-feedback">Please enter your name.</div>
        </div>

        <!-- Email -->
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email" required>
          <label for="email">Email Address</label>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <!-- Phone (with pattern for 10-digit validation) -->
        <div class="form-floating mb-3">
          <input type="tel" class="form-control" id="phone" placeholder="Phone" pattern="[0-9]{10}" required>
          <label for="phone">Phone Number</label>
          <div class="invalid-feedback">Please enter a valid 10-digit phone number.</div>
        </div>

        <!-- Event -->
        <div class="form-floating mb-3">
          <select class="form-select" id="event" required>
            <option value="">Select Event</option>
            <option>Tech Fest 2025</option>
            <option>Cultural Night</option>
            <option>Sports Day</option>
          </select>
          <label for="event">Select Event</label>
          <div class="invalid-feedback">Please select an event.</div>
        </div>

        <!-- Date -->
        <div class="form-floating mb-3">
          <input type="date" class="form-control" id="date" required>
          <label for="date">Date of Registration</label>
          <div class="invalid-feedback">Please select a date.</div>
        </div>

        <!-- Submit with tooltip directly on button -->
        <div class="text-center">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Enable tooltips
    // document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
    //   new bootstrap.Tooltip(el);
    // });


    // Set minimum date to today
    document.getElementById('date').min = new Date().toISOString().split('T')[0];

    // Validation
    document.getElementById('myForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!this.checkValidity()) {
        this.classList.add('was-validated');
      } else {
        document.getElementById('successMsg').classList.remove('d-none');
        this.reset();
        this.classList.remove('was-validated');
      }
    });
  </script>

</body>
</html>
