<!DOCTYPE html>
<html>
<head>
    <title>Facebook Page</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>






<body>






<!-- 🔷 Top Navbar -->
<nav class="navbar bg-primary navbar-dark">
    <div class="container">
        <!-- Logo -->
        <h3 class="text-white">facebook</h3>
        <!-- Login Form -->
        <form class="d-flex">
            <input class="form-control me-2" type="text" placeholder="Email">
            <input class="form-control me-2" type="password" placeholder="Password">
            <button class="btn btn-light">Login</button>
        </form>
    </div>
</nav>








<!-- 🔷 Main Section -->
<div class="container mt-4">
    <div class="row">





        <!-- 🔹 Left Side -->
        <div class="col-md-6">
            <h4>Facebook is useless without friends.</h4>
            <h5 class="text-primary">Make More Friends.</h5>
            <div class="card mt-3">
                <div class="card-body text-center">
                    <p>Facebook helps you connect and share with the people in your life.</p>
                    <img src="manus_style.jpg" class="img-fluid">
                </div>
            </div>
        </div>




        <!-- 🔹 Right Side (Signup) -->
        <div class="col-md-6">
            <h3>Create an Account</h3>
            <p>It's free and always will be.</p>
            <div class="card">
                <div class="card-body">
                    <input class="form-control mb-2" placeholder="First name">
                    <input class="form-control mb-2" placeholder="Last name">
                    <input class="form-control mb-2" placeholder="Email">
                    <input class="form-control mb-2" placeholder="Re-enter Email">
                    <input class="form-control mb-2" type="password" placeholder="Password">
                    <input class="form-control mb-2" type="date">
                    <div class="mb-2">
                        <input type="radio"> Male
                        <input type="radio"> Female
                    </div>
                    <p>By clicking create an account, you agree to our Terms.</p>
                    <button class="btn btn-success">Sign Up</button>
                </div>
            </div>
        </div>

    </div>
</div>













<!-- 🔷 Footer -->
<div class="bg-dark text-white text-center p-2 mt-4">
    Facebook Clone | Bootstrap Page
</div>

</body>
</html>
